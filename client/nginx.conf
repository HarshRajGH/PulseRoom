# SyncWave frontend — serves the built SPA and reverse-proxies API/WebSocket
# traffic to the backend container, so the browser only ever talks to one
# origin (avoids CORS entirely in production).

gzip on;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 25m;

  # Long-cache hashed build assets; index.html itself stays revalidate-on-load.
  location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # REST API → backend
  location /api/ {
    proxy_pass http://server:5000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Swagger docs → backend
  location /api-docs {
    proxy_pass http://server:5000/api-docs;
    proxy_set_header Host $host;
  }

  # Socket.io (WebSocket + polling fallback) → backend
  location /socket.io/ {
    proxy_pass http://server:5000/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400;
  }

  # SPA fallback — client-side routing (React Router)
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  location = /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
