version: '3.9'

# Full-stack SyncWave: nginx-served React frontend (reverse-proxying API +
# Socket.io to the backend, so the browser only sees one origin), the
# Express API, its BullMQ worker, MongoDB, and Redis.
#
# Quickstart:
#   cp .env.example .env   # fill in real secrets for anything beyond local dev
#   docker compose up --build
#   → http://localhost:8080

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_SOCKET_URL: /
    container_name: syncwave-client
    restart: unless-stopped
    ports:
      - '${CLIENT_PORT:-8080}:80'
    depends_on:
      - server

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: syncwave-server
    restart: unless-stopped
    ports:
      - '${SERVER_PORT:-5000}:5000'
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/syncwave
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLIENT_URL=${CLIENT_URL:-http://localhost:8080}
    depends_on:
      - mongo
      - redis
    volumes:
      - server-logs:/usr/src/app/logs
      - server-uploads:/usr/src/app/uploads

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: syncwave-worker
    restart: unless-stopped
    command: node src/jobs/worker.runner.js
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/syncwave
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    container_name: syncwave-mongo
    restart: unless-stopped
    ports:
      - '${MONGO_PORT:-27017}:27017'
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: syncwave-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT_HOST:-6379}:6379'
    volumes:
      - redis-data:/data

volumes:
  mongo-data:
  redis-data:
  server-logs:
  server-uploads:
