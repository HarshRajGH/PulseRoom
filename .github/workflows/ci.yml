name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  client:
    name: Client — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npx eslint src --ext .js,.jsx
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  server:
    name: Server — lint & smoke-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: Syntax-check every source file
        run: |
          for f in $(find src -name "*.js"); do node --check "$f"; done
      - name: Verify app wiring (require graph, no live DB needed)
        run: |
          node -e "
            process.env.MONGO_URI='mongodb://localhost:27017/syncwave_ci';
            require('./src/app.js');
            console.log('app.js loaded OK');
          "

  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [client, server]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: server
          push: false
          tags: syncwave-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: client
          push: false
          tags: syncwave-client:ci
          build-args: |
            VITE_API_URL=/api/v1
            VITE_SOCKET_URL=/
          cache-from: type=gha
          cache-to: type=gha,mode=max
